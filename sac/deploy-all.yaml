apiVersion: apps/v1
kind: Deployment
metadata:
  name: sac-webhook-deployment
  namespace: default
  labels:
    app: sac-webhook-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sac-webhook-deployment
  template:
    metadata:
      labels:
        app: sac-webhook-deployment
    spec:
      containers:
        - name: webhook
          image: sac-webhook:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: certs
          secret:
            secretName: webhook-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: sac-webhook-service
  namespace: default
spec:
  ports:
    - port: 443
      targetPort: 8443
  selector:
    app: sac-webhook-deployment
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: sac-validation-webhook-config
webhooks:
  - name: sac-webhook.default.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 5
    clientConfig:
      service:
        name: sac-webhook-service
        namespace: default
        path: "/validate"
      caBundle: ""
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]