apiVersion: apps/v1
kind: Deployment
metadata:
  name: sac-webhook-deployment
  namespace: default
  labels:
    app: sac-webhook-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sac-webhook-deployment
  template:
    metadata:
      labels:
        app: sac-webhook-deployment
    spec:
      containers:
        - name: webhook
          image: sac-webhook:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          # TEMP off probs until on /health
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8443
          #     scheme: HTTPS
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8443
          #     scheme: HTTPS
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
      volumes:
        - name: certs
          secret:
            secretName: webhook-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: sac-webhook-service
  namespace: default
spec:
  ports:
    - port: 443
      targetPort: 8443
  selector:
    app: sac-webhook-deployment